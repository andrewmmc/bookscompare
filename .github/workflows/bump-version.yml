name: Bump Version

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to bump
        required: false
        type: choice
        default: mobile
        options:
          - mobile
          - api
          - contracts
      bump:
        description: Version component to bump
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  actions: write
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: bash scripts/bump-version.sh "${{ inputs.bump }}" "${{ inputs.package }}"

      - name: Capture mobile release tag
        if: inputs.package == 'mobile'
        id: release_tag
        run: echo "value=$(git describe --tags --exact-match HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Trigger mobile release workflow
        if: inputs.package == 'mobile'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run appstore-mobile.yml \
            --ref "${{ steps.release_tag.outputs.value }}"
